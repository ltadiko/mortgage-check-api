# ============================================================================
# Mortgage Check API — CI/CD Pipeline (GitHub Actions)
# ============================================================================
# Triggers: Push/PR to main and feature branches
# Stages: Build & Test → Code Quality → Docker Build & Push
#
# Configure the following secrets/variables in GitHub Settings:
#   Secrets:
#     DOCKER_REGISTRY_URL      - e.g. ghcr.io, myregistry.azurecr.io, 123456.dkr.ecr.eu-west-1.amazonaws.com
#     DOCKER_REGISTRY_USERNAME - Registry username or service principal
#     DOCKER_REGISTRY_PASSWORD - Registry password or token
#   Variables (optional):
#     DOCKER_IMAGE_NAME        - Override image name (default: mortgage-api)
#     JAVA_VERSION             - Override Java version (default: 21)
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'release/**' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: ${{ vars.JAVA_VERSION || '21' }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'mortgage-api' }}

permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write

jobs:

  # --------------------------------------------------------------------------
  # Stage 1: Build, Test & Quality
  # --------------------------------------------------------------------------
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 5

  # --------------------------------------------------------------------------
  # Stage 2: Docker Build & Push
  # --------------------------------------------------------------------------
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_REGISTRY_URL }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
