opencollection: 1.0.0
info:
  name: Mortgage API
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: 127.0.0.1
      variables:
        - name: baseurl
          value: http://127.0.0.1:8080
items:
  - info:
      name: Interest Rates
      type: folder
      seq: 1
    request:
      auth: inherit
    items:
      - info:
          name: Get All Rates
          type: http
          seq: 1
        http:
          method: GET
          url: '{{baseurl}}/api/interest-rates'
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
  - info:
      name: Mortgage Check
      type: folder
      seq: 2
    request:
      auth: inherit
    items:
      - info:
          name: Check Feasibility - Rejected (Income)
          type: http
          seq: 2
        http:
          method: POST
          url: '{{baseurl}}/api/mortgage-check'
          headers:
            - name: Content-Type
              value: application/json
          body:
            type: json
            data: |-
              {
                  "income": 30000,
                  "maturityPeriod": 30,
                  "loanValue": 200000,
                  "homeValue": 250000
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Check Feasibility - Success
          type: http
          seq: 1
        http:
          method: POST
          url: '{{baseurl}}/api/mortgage-check'
          headers:
            - name: Content-Type
              value: application/json
          body:
            type: json
            data: |-
              {
                  "income": 60000,
                  "maturityPeriod": 30,
                  "loanValue": 200000,
                  "homeValue": 250000
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Trigger Validation Error (Invalid Data)
          type: http
          seq: 4
        http:
          method: POST
          url: '{{baseurl}}/api/mortgage-check'
          headers:
            - name: Content-Type
              value: application/json
          body:
            type: json
            data: |-
              {
                  "income": -5000,
                  "maturityPeriod": 99,
                  "loanValue": 0,
                  "homeValue": 100
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
      - info:
          name: Check Feasibility - Rejected (Lone value)
          type: http
          seq: 4
        http:
          method: POST
          url: '{{baseurl}}/api/mortgage-check'
          headers:
            - name: Content-Type
              value: application/json
          body:
            type: json
            data: |-
              {
                  "income": 80000,
                  "maturityPeriod": 30,
                  "loanValue": 250001,
                  "homeValue": 250000
              }
          auth: inherit
        settings:
          encodeUrl: true
          timeout: 0
          followRedirects: true
          maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-02-26T14:41:55.971Z'
    exportedUsing: Bruno
